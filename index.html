};

// ─── MARKET INTELLIGENCE ─────────────────────────────────────────────────────

const MarketIntelligence = () => {
  const [activeChart, setActiveChart] = useState("vacancy");
  const svgW = 640, svgH = 240, padL = 40, padB = 50, padT = 20, padR = 20;
  const chartW = svgW - padL - padR;
  const chartH = svgH - padT - padB;

  const VacancyChart = () => {
    const data = MARKET_DATA.vacancy;
    const maxVal = 14;
    const barGroupW = chartW / data.length;
    const barW = barGroupW * 0.22;
    const colors = ["#60a5fa", "#f59e0b", "#4ade80"];
    return (
      <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", maxWidth: svgW }}>
        {[0, 4, 8, 12].map(v => {
          const y = padT + chartH - (v / maxVal) * chartH;
          return (
            <g key={v}>
              <line x1={padL} y1={y} x2={svgW - padR} y2={y} stroke="#1e293b" strokeWidth="1" />
              <text x={padL - 6} y={y + 4} fill="#64748b" fontSize="10" textAnchor="end">{v}%</text>
            </g>
          );
        })}
        {data.map((d, i) => {
          const gX = padL + i * barGroupW + barGroupW * 0.12;
          const vals = [d.office, d.industrial, d.retail];
          return (
            <g key={i}>
              {vals.map((v, j) => {
                const bH = (v / maxVal) * chartH;
                return (
                  <rect key={j} x={gX + j * (barW + 3)} y={padT + chartH - bH} width={barW} height={bH} rx="2" fill={colors[j]} opacity="0.85" />
                );
              })}
              <text x={padL + i * barGroupW + barGroupW / 2} y={svgH - 6} fill="#64748b" fontSize="9" textAnchor="middle">{d.market.replace('\n', ' ')}</text>
            </g>
          );
        })}
        {colors.map((c, i) => (
          <g key={i}>
            <rect x={svgW - padR - 160 + i * 55} y={8} width={10} height={10} rx="2" fill={c} />
            <text x={svgW - padR - 148 + i * 55} y={17} fill="#94a3b8" fontSize="10">{["Office", "Industrial", "Retail"][i]}</text>
          </g>
        ))}
      </svg>
    );
  };

  const CapRateChart = () => {
    const data = MARKET_DATA.capTrend;
    const minCap = 4.8, maxCap = 6.3;
    const range = maxCap - minCap;
    const getY = v => padT + chartH - ((v - minCap) / range) * chartH;
    const getX = i => padL + (i / (data.length - 1)) * chartW;
    const lines = [
      { key: "office", color: "#60a5fa", label: "Office" },
      { key: "industrial", color: "#f59e0b", label: "Industrial" },
      { key: "retail", color: "#4ade80", label: "Retail" },
    ];
    return (
      <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", maxWidth: svgW }}>
        {[5.0, 5.5, 6.0].map(v => {
          const y = getY(v);
          return (
            <g key={v}>
              <line x1={padL} y1={y} x2={svgW - padR} y2={y} stroke="#1e293b" strokeWidth="1" />
              <text x={padL - 6} y={y + 4} fill="#64748b" fontSize="10" textAnchor="end">{v}%</text>
            </g>
          );
        })}
        {lines.map(({ key, color, label }, li) => {
          const pts = data.map((d, i) => `${getX(i)},${getY(d[key])}`).join(" ");
          return (
            <g key={key}>
              <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" />
              {data.map((d, i) => (
                <circle key={i} cx={getX(i)} cy={getY(d[key])} r="4" fill={color} stroke="#0f172a" strokeWidth="1.5" />
              ))}
              <rect x={svgW - padR - 160 + li * 60} y={8} width={10} height={3} rx="1.5" fill={color} />
              <text x={svgW - padR - 148 + li * 60} y={17} fill="#94a3b8" fontSize="10">{label}</text>
            </g>
          );
        })}
        {data.map((d, i) => (
          <text key={i} x={getX(i)} y={svgH - 6} fill="#64748b" fontSize="9" textAnchor="middle">{d.quarter}</text>
        ))}
      </svg>
    );
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: "#f1f5f9", marginBottom: 4 }}>Market Intelligence</h2>
          <p style={{ color: "#94a3b8", fontSize: 14 }}>Metro Vancouver CRE market analytics — Q2 2025</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {[{ id: "vacancy", label: "Vacancy" }, { id: "cap", label: "Cap Rates" }].map(tab => (
            <button key={tab.id} onClick={() => setActiveChart(tab.id)} style={{ padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s", background: activeChart === tab.id ? "#f59e0b" : "#1e293b", color: activeChart === tab.id ? "#0f172a" : "#94a3b8", border: `1px solid ${activeChart === tab.id ? "#f59e0b" : "#334155"}` }}>
              {tab.label}
            </button>
          ))}
        </div>
      </div>

      <div className="card" style={{ padding: 24, marginBottom: 20 }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", marginBottom: 16 }}>
          {activeChart === "vacancy" ? "Vacancy Rates by Submarket (%)" : "Cap Rate Trends by Asset Class (%)"}
        </h3>
        {activeChart === "vacancy" ? <VacancyChart /> : <CapRateChart />}
      </div>

      <div className="ai-callout">
        <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
          <div style={{ background: "#f59e0b22", borderRadius: 8, padding: 8, flexShrink: 0 }}>
            <Icon name="ai" size={18} className="" style={{ color: "#f59e0b" }} />
            <span style={{ color: "#f59e0b" }}>✦</span>
          </div>
          <div>
            <div style={{ fontWeight: 700, color: "#f59e0b", fontSize: 13, marginBottom: 6 }}>AI Market Insight</div>
            <p style={{ color: "#cbd5e1", fontSize: 13, lineHeight: "1.6", marginBottom: 8 }}>
              Industrial vacancy in Metro Vancouver continues to tighten despite rising new supply, now at <strong style={{ color: "#f59e0b" }}>1.4–2.9%</strong> across submarkets — among the lowest in North America. Cap rate compression in the industrial sector has decelerated, with rates stabilizing around <strong style={{ color: "#f59e0b" }}>5.8–6.1%</strong> as buyers adjust to higher financing costs.
            </p>
            <p style={{ color: "#cbd5e1", fontSize: 13, lineHeight: "1.6" }}>
              <strong style={{ color: "#e2e8f0" }}>Opportunity signal:</strong> Downtown Vancouver office vacancy at <strong style={{ color: "#f59e0b" }}>9.2%</strong> — elevated but stabilizing. Well-leased Class A assets continue to trade at sub-5% cap rates. Consider accelerating due diligence on <strong style={{ color: "#e2e8f0" }}>400 Burrard St</strong> before competing bids emerge.
            </p>
          </div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12, marginTop: 20 }}>
        {[
          { label: "Overall CRE Transaction Volume", val: "$2.1B", sub: "Q1 2025 Metro Vancouver", delta: "+8.4% YoY", up: true },
          { label: "Industrial Vacancy Rate", val: "1.8%", sub: "Metro Vancouver avg.", delta: "-0.3% QoQ", up: true },
          { label: "Office Avg. Cap Rate", val: "5.2%", sub: "Class A Downtown", delta: "+0.2% QoQ", up: false },
          { label: "Retail Avg. Asking Rent", val: "$42/SF", sub: "Ground-floor retail", delta: "+1.8% YoY", up: true },
        ].map(item => (
          <div key={item.label} className="stat-card">
            <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>{item.label}</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: "#f59e0b", marginBottom: 2 }}>{item.val}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6 }}>{item.sub}</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: item.up ? "#4ade80" : "#f87171" }}>{item.delta}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

  const avgDays = 67;

  const stats = [
    { label: "Total Pipeline Value", val: `$${pipelineTotal.toFixed(1)}M`, sub: "Across all stages", icon: "trending", delta: "+12.4% MoM" },
    { label: "Active Deals", val: activeDeals, sub: "In progress", icon: "pipeline", delta: `+${activeDeals - 3} this month` },
    { label: "Closed YTD", val: `$${closedVal.toFixed(1)}M`, sub: "2 transactions", icon: "check", delta: "On target" },
    { label: "Avg. Days to Close", val: avgDays, sub: "Rolling 12 months", icon: "clock", delta: "-8 days vs prior yr" },
  ];

  const stageData = Object.entries(PIPELINE).map(([stage, deals]) => ({
    stage,
    count: deals.length,
    val: deals.reduce((a, d) => a + parseFloat(d.size.replace('$','').replace('M','')), 0),
  }));

  const maxVal2 = Math.max(...stageData.map(s => s.val));
  const chartH2 = 160, chartW2 = 500, padL2 = 40, padB2 = 40, padT2 = 10;
  const innerW = chartW2 - padL2 - 20;
  const innerH = chartH2 - padT2 - padB2;
  const barW2 = innerW / stageData.length * 0.55;

  const typeBreakdown = ["Office", "Industrial", "Retail"].map(t => {
    const props = PROPERTIES.filter(p => p.type === t);
    const val = props.reduce((a, p) => a + parseFloat(p.price.replace('$','').replace('M','')), 0);
    return { type: t, count: props.length, val: val.toFixed(1) };
  });

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: "#f1f5f9", marginBottom: 4 }}>Analytics Dashboard</h2>
        <p style={{ color: "#94a3b8", fontSize: 14 }}>Portfolio overview — as of May 2025</p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 16, marginBottom: 24 }}>
        {stats.map(s => (
          <div key={s.label} className="stat-card">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.label}</span>
              <div style={{ background: "#f59e0b22", borderRadius: 6, padding: 6, color: "#f59e0b" }}><Icon name={s.icon} size={14} /></div>
            </div>
            <div style={{ fontSize: 28, fontWeight: 800, color: "#f59e0b", marginBottom: 4 }}>{s.val}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6 }}>{s.sub}</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#4ade80" }}>{s.delta}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
        <div className="card" style={{ padding: 20 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 16 }}>Pipeline by Stage ($M)</h3>
          <svg viewBox={`0 0 ${chartW2} ${chartH2}`} style={{ width: "100%" }}>
            {[0, 20, 40].map(v => {
              const y = padT2 + innerH - (v / maxVal2) * innerH;
              return (
                <g key={v}>
                  <line x1={padL2} y1={y} x2={chartW2 - 20} y2={y} stroke="#1e293b" strokeWidth="1" />
                  <text x={padL2 - 4} y={y + 4} fill="#64748b" fontSize="9" textAnchor="end">{v}M</text>
                </g>
              );
            })}
            {stageData.map((s, i) => {
              const bH = (s.val / maxVal2) * innerH;
              const x = padL2 + i * (innerW / stageData.length) + (innerW / stageData.length - barW2) / 2;
              const stageColors = ["#60a5fa", "#fbbf24", "#c084fc", "#f472b6", "#4ade80"];
              return (
                <g key={s.stage}>
                  <rect x={x} y={padT2 + innerH - bH} width={barW2} height={bH} rx="3" fill={stageColors[i]} opacity="0.85" />
                  <text x={x + barW2 / 2} y={chartH2 - 2} fill="#64748b" fontSize="8" textAnchor="middle">{s.stage.replace(' ', '\n')}</text>
                </g>
              );
            })}
          </svg>
        </div>

        <div className="card" style={{ padding: 20 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 16 }}>Portfolio by Asset Class</h3>
          {typeBreakdown.map((t, i) => {
            const pct = Math.round((parseFloat(t.val) / PROPERTIES.reduce((a, p) => a + parseFloat(p.price.replace('$','').replace('M','')), 0)) * 100);
            const cols = ["#60a5fa", "#f59e0b", "#4ade80"];
            return (
              <div key={t.type} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>{t.type}</span>
                  <span style={{ fontSize: 12, color: "#94a3b8" }}>{t.count} props · <span style={{ color: "#f59e0b", fontWeight: 700 }}>${t.val}M</span></span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${pct}%`, background: cols[i] }}></div>
                </div>
                <div style={{ textAlign: "right", fontSize: 10, color: "#64748b", marginTop: 2 }}>{pct}% of portfolio</div>
              </div>
            );
          })}

          <div style={{ borderTop: "1px solid #334155", paddingTop: 16, marginTop: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#64748b" }}>Total Tracked Value</span>
              <span style={{ fontSize: 16, fontWeight: 800, color: "#f59e0b" }}>
                ${PROPERTIES.reduce((a, p) => a + parseFloat(p.price.replace('$','').replace('M','')), 0).toFixed(1)}M
              </span>
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{ padding: 20 }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 16 }}>Recent Activity</h3>
        <div>
          {[
            { icon: "📝", text: "LOI executed for 789 Pacific Blvd", sub: "2 days ago · Sarah Chen (Blackstone)", color: "#60a5fa" },
            { icon: "🔍", text: "Phase I ESA completed — 2200 Boundary Rd", sub: "3 days ago · Environmental review passed", color: "#4ade80" },
            { icon: "🤝", text: "PSA signed — 980 Howe St, Vancouver", sub: "5 days ago · Under Contract at $9.8M", color: "#c084fc" },
            { icon: "✅", text: "Closed: 7491 Vantage Way, Delta", sub: "Mar 22 · $22.6M Industrial", color: "#4ade80" },
            { icon: "📊", text: "Financial model updated — 400 Burrard St", sub: "Today · Updated NOI projections", color: "#fbbf24" },
          ].map((item, i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 0", borderBottom: i < 4 ? "1px solid #1e293b" : "none" }}>
              <div style={{ fontSize: 18, lineHeight: 1, marginTop: 1 }}>{item.icon}</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>{item.text}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{item.sub}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ────────────────────────────────────────────────────────────────

const NAV_ITEMS = [
  { id: "analytics", label: "Dashboard", icon: "analytics" },
  { id: "pipeline", label: "Pipeline", icon: "pipeline" },
  { id: "properties", label: "Properties", icon: "database" },
  { id: "investors", label: "Investors", icon: "investors" },
  { id: "market", label: "Market", icon: "market" },
  { id: "docs", label: "Documents", icon: "docs" },
];

export default function App() {
  const [active, setActive] = useState("analytics");

  const renderScreen = () => {
    if (active === "pipeline") return <DealPipeline />;
    if (active === "properties") return <PropertyDatabase />;
    if (active === "investors") return <InvestorNetwork />;
    if (active === "market") return <MarketIntelligence />;
    if (active === "docs") return <DocumentVault />;
    return <AnalyticsDashboard />;
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0f172a", display: "flex" }}>
      {/* Sidebar — desktop */}
      <div className="sidebar-desktop" style={{ width: 240, flexShrink: 0, background: "#0a1120", borderRight: "1px solid #1e293b", flexDirection: "column", position: "fixed", top: 0, left: 0, bottom: 0, zIndex: 40 }}>
        <div style={{ padding: "24px 20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <div style={{ background: "#f59e0b", borderRadius: 8, width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ color: "#0f172a", fontWeight: 800, fontSize: 15 }}>C</span>
            </div>
            <div>
              <div style={{ fontWeight: 800, fontSize: 16, color: "#f1f5f9", letterSpacing: "-0.01em" }}>CREDesk</div>
              <div style={{ fontSize: 10, color: "#64748b", fontWeight: 500 }}>by VancouverAISolutions</div>
            </div>
          </div>
        </div>
        <div style={{ padding: "0 12px", flex: 1, overflowY: "auto" }}>
          <div style={{ fontSize: 10, color: "#334155", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", padding: "8px 4px", marginBottom: 4 }}>Navigation</div>
          {NAV_ITEMS.map(item => (
            <div key={item.id} className={`sidebar-item${active === item.id ? " active" : ""}`} onClick={() => setActive(item.id)}>
              <Icon name={item.icon} size={16} />
              <span>{item.label}</span>
            </div>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid #1e293b" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #f59e0b, #d97706)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, color: "#0f172a" }}>MP</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>Mike Payne</div>
              <div style={{ fontSize: 11, color: "#64748b" }}>Senior Broker</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, marginLeft: 0, display: "flex", flexDirection: "column" }} className="main-content">
        {/* Desktop offset */}
        <div style={{ display: "none" }} className="lg-sidebar-offset"></div>
        <style>{`@media (min-width: 1024px) { .main-content { margin-left: 240px; } }`}</style>

        {/* Top bar */}
        <div style={{ background: "#0a1120", borderBottom: "1px solid #1e293b", padding: "0 24px", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 30 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {/* Mobile logo */}
            <div style={{ display: "flex", alignItems: "center", gap: 8 }} className="mobile-logo">
              <div style={{ background: "#f59e0b", borderRadius: 6, width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ color: "#0f172a", fontWeight: 800, fontSize: 13 }}>C</span>
              </div>
              <span style={{ fontWeight: 800, fontSize: 15, color: "#f1f5f9" }}>CREDesk</span>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ position: "relative" }}>
              <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", color: "#64748b" }}><Icon name="search" size={13} /></span>
              <input type="text" placeholder="Quick search…" style={{ paddingLeft: 30, width: 200, background: "#1e293b", border: "1px solid #334155", color: "#e2e8f0", borderRadius: 8, padding: "6px 10px 6px 30px", fontSize: 13 }} />
            </div>
            <button style={{ background: "none", border: "none", cursor: "pointer", color: "#94a3b8", position: "relative" }}>
              <Icon name="bell" size={18} />
              <span style={{ position: "absolute", top: -2, right: -2, width: 8, height: 8, background: "#f59e0b", borderRadius: "50%", border: "1.5px solid #0a1120" }}></span>
            </button>
            <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg, #f59e0b, #d97706)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 11, color: "#0f172a", cursor: "pointer" }}>MP</div>
          </div>

        {/* Page content */}
        <div style={{ padding: 28, flex: 1, overflowY: "auto" }} className="scrollbar-thin">
          {renderScreen()}

      {/* Bottom nav — mobile */}
      <nav className="bottom-nav" style={{ justifyContent: "space-around" }}>
        {NAV_ITEMS.map(item => (
          <button key={item.id} onClick={() => setActive(item.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "10px 4px", background: "none", border: "none", cursor: "pointer", color: active === item.id ? "#f59e0b" : "#64748b", transition: "color 0.15s" }}>
            <Icon name={item.icon} size={18} />

}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
